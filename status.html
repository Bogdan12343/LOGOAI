<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status — LOGOAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050508; color: #fff; font-family: 'Inter', sans-serif; line-height: 1.8; }
  .container { max-width: 800px; margin: 0 auto; padding: 80px 40px; }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 24px; background: linear-gradient(135deg, #7c3aed, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 48px; display: block; text-decoration: none; }
  h1 { font-family: 'Syne', sans-serif; font-size: 40px; font-weight: 800; margin-bottom: 24px; }
  p { color: #cbd5e1; margin-bottom: 16px; }
  .back { display: inline-flex; align-items: center; gap: 8px; color: #94a3b8; text-decoration: none; margin-bottom: 48px; font-size: 14px; }
  .back:hover { color: #fff; }
  .status-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); border-radius: 100px; padding: 8px 20px; margin-bottom: 40px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
  .status-text { color: #22c55e; font-weight: 600; }
  .service { background: #0f0f1a; border: 1px solid rgba(124,58,237,0.2); border-radius: 12px; padding: 20px 24px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
  .service-name { font-weight: 600; }
  .service-status { color: #22c55e; font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="logo">LOGO AI</a>
  <a href="index.html" class="back">← Back to Home</a>
  <h1>System Status</h1>

  <div class="status-badge">
    <div class="dot"></div>
    <span class="status-text">All systems operational</span>
  </div>

  <div class="service"><span class="service-name">🤖 AI Logo Generation</span><span class="service-status">✓ Operational</span></div>
  <div class="service"><span class="service-name">🔐 Authentication</span><span class="service-status">✓ Operational</span></div>
  <div class="service"><span class="service-name">💳 Payment Processing</span><span class="service-status">✓ Operational</span></div>
  <div class="service"><span class="service-name">📦 File Downloads</span><span class="service-status">✓ Operational</span></div>
  <div class="service"><span class="service-name">🌐 Website</span><span class="service-status">✓ Operational</span></div>

  <p style="margin-top:32px;">Last updated: May 2026. For incidents, contact <a href="mailto:support@logoai.com" style="color:#7c3aed">support@logoai.com</a></p>
</div>
</body>
</html>
