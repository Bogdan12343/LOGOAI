<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — LOGOAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050508; color: #fff; font-family: 'Inter', sans-serif; line-height: 1.8; }
  .container { max-width: 800px; margin: 0 auto; padding: 80px 40px; }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 24px; background: linear-gradient(135deg, #7c3aed, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 48px; display: block; text-decoration: none; }
  h1 { font-family: 'Syne', sans-serif; font-size: 40px; font-weight: 800; margin-bottom: 24px; }
  h2 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; margin: 40px 0 16px; color: #a78bfa; }
  p { color: #cbd5e1; margin-bottom: 16px; }
  .back { display: inline-flex; align-items: center; gap: 8px; color: #94a3b8; text-decoration: none; margin-bottom: 48px; font-size: 14px; }
  .back:hover { color: #fff; }
  .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 40px 0; }
  .contact-card { background: #0f0f1a; border: 1px solid rgba(124,58,237,0.2); border-radius: 16px; padding: 24px; }
  .contact-icon { font-size: 32px; margin-bottom: 12px; }
  .contact-title { font-family: 'Syne', sans-serif; font-weight: 700; margin-bottom: 8px; }
  .contact-desc { color: #94a3b8; font-size: 14px; }
  .contact-link { color: #7c3aed; text-decoration: none; font-weight: 500; }
  .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  label { color: #94a3b8; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
  input, textarea { padding: 12px 16px; background: #1a1a2e; border: 1px solid rgba(124,58,237,0.2); border-radius: 10px; color: #fff; font-size: 14px; font-family: 'Inter', sans-serif; }
  textarea { height: 120px; resize: vertical; }
  .btn { padding: 14px 28px; background: linear-gradient(135deg, #7c3aed, #ec4899); border: none; border-radius: 10px; color: #fff; font-weight: 600; font-size: 15px; cursor: pointer; }
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="logo">LOGO AI</a>
  <a href="index.html" class="back">← Back to Home</a>
  <h1>Contact Us</h1>
  <p>We're here to help! Reach out to us through any of the channels below.</p>

  <div class="contact-grid">
    <div class="contact-card">
      <div class="contact-icon">📧</div>
      <div class="contact-title">Email Support</div>
      <div class="contact-desc">For general inquiries and support</div>
      <a href="mailto:support@logoai.com" class="contact-link">support@logoai.com</a>
    </div>
    <div class="contact-card">
      <div class="contact-icon">⚡</div>
      <div class="contact-title">Response Time</div>
      <div class="contact-desc">We typically respond within 24 hours on business days.</div>
    </div>
  </div>

  <h2>Send us a message</h2>
  <div class="form-group"><label>Your Name</label><input type="text" placeholder="John Doe"></div>
  <div class="form-group"><label>Email</label><input type="email" placeholder="you@example.com"></div>
  <div class="form-group"><label>Subject</label><input type="text" placeholder="How can we help?"></div>
  <div class="form-group"><label>Message</label><textarea placeholder="Tell us more..."></textarea></div>
  <button class="btn">Send Message</button>
</div>
</body>
</html>
